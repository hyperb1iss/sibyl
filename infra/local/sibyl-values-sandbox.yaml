# Sandbox feature overlay for local Tilt development.
# Usage: tilt up -- --sandbox

sandbox:
  enabled: true

  env:
    SIBYL_SANDBOX_ENABLED: "true"
    SIBYL_SANDBOX_MODE: "enforced"
    SIBYL_SANDBOX_K8S_NAMESPACE: "sibyl"
    SIBYL_SANDBOX_DEFAULT_IMAGE: "sibyl-sandbox:dev"
    SIBYL_SANDBOX_WORKTREE_BASE: "/tmp/sibyl/sandboxes"
    SIBYL_SANDBOX_IDLE_TTL_SECONDS: "1800"
    SIBYL_SANDBOX_MAX_LIFETIME_SECONDS: "14400"
    SIBYL_SANDBOX_RECONCILE_ENABLED: "true"

  rbac:
    enabled: true

  # Keep off by default for local dev unless you want strict egress controls.
  networkPolicy:
    enabled: false
    ingressPorts:
      - 8080
    allowDns: true
    allowWebEgress: true
