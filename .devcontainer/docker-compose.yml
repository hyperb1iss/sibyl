services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace/sibyl:cached
    command: sleep infinity
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_COORDINATION_BACKEND: auto
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: root
      SIBYL_SURREAL_PASSWORD: root

  surrealdb:
    image: surrealdb/surrealdb:latest
    command:
      [
        "start",
        "--log",
        "info",
        "--user",
        "root",
        "--pass",
        "root",
        "rocksdb:///data/sibyl.db",
      ]
    ports:
      - "8000"
    volumes:
      - surreal-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  surreal-data:
