{{- if and .Values.sandbox.enabled .Values.sandbox.rbac.enabled }}
# Namespace-scoped Role for agent-sandbox CRD and runtime pod access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sibyl.fullname" . }}-sandbox-controller
  labels:
    {{- include "sibyl.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sibyl.fullname" . }}-sandbox-controller
  labels:
    {{- include "sibyl.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ default (include "sibyl.serviceAccountName" .) .Values.sandbox.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sibyl.fullname" . }}-sandbox-controller
{{- end }}
