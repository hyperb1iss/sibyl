{{- if .Values.ingress.gatewayApi.enabled -}}
{{- $hostnames := .Values.ingress.gatewayApi.hostnames -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "sibyl.fullname" . }}
  labels:
    {{- include "sibyl.labels" . | nindent 4 }}
  {{- with .Values.ingress.gatewayApi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- required "ingress.gatewayApi.parentRefs is required when Gateway API ingress is enabled" .Values.ingress.gatewayApi.parentRefs | toYaml | nindent 4 }}
  hostnames:
    {{- if $hostnames }}
    {{- toYaml $hostnames | nindent 4 }}
    {{- else }}
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: {{ ternary "Exact" "PathPrefix" (eq (.pathType | default "Prefix") "Exact") }}
            value: {{ .path | quote }}
      backendRefs:
        {{- if eq (.service | default "frontend") "backend" }}
        - name: {{ include "sibyl.fullname" $ }}-backend
          port: {{ $.Values.backend.service.port }}
        {{- else if eq (.service | default "frontend") "frontend" }}
        - name: {{ include "sibyl.fullname" $ }}-frontend
          port: {{ $.Values.frontend.service.port }}
        {{- else }}
        - name: {{ .service }}
          port: {{ required "HTTPRoute custom service paths require port" .port }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
