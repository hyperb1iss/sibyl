{{- if and .Values.rbac.create .Values.snapshot.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sibyl-surrealdb.fullname" . }}-snapshot
  labels:
    {{- include "sibyl-surrealdb.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshots
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sibyl-surrealdb.fullname" . }}-snapshot
  labels:
    {{- include "sibyl-surrealdb.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sibyl-surrealdb.fullname" . }}-snapshot
subjects:
  - kind: ServiceAccount
    name: {{ include "sibyl-surrealdb.serviceAccountName" . }}
{{- end }}
