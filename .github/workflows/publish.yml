name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build but don't publish)"
        required: false
        type: boolean
        default: false

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: hyperb1iss

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # =========================================================================
  # RC Gate: direct publish dispatches must prove the tagged checkout first
  # =========================================================================
  rc-gate:
    name: "◇ RC Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Install system dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: "◇ Setup moonrepo toolchain"
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: publish-rc-gate-v1

      - name: "◇ Verify toolchain"
        run: |
          chmod +x "$HOME/.proto/shims"/* 2>/dev/null || true
          chmod +x "$HOME/.proto/bin"/* 2>/dev/null || true
          moon --version
          proto --version
          uv --version

      - name: "◇ Install Node dependencies"
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: "◇ Sync Python workspace"
        run: uv sync --locked --all-packages

      - name: "◇ Run RC gate bundle"
        run: moon run :check

  # =========================================================================
  # Registry preflight: fail before native builds when live publishing is not ready
  # =========================================================================
  registry-preflight:
    name: "◇ Docker: Registry preflight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: "◇ Verify Docker Hub publishing contract"
        if: ${{ !inputs.dry_run }}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
            echo "::error::DOCKERHUB_USERNAME repository variable is not configured."
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "::error::DOCKERHUB_TOKEN repository secret is not configured."
            exit 1
          fi
          for image in api web; do
            url="https://hub.docker.com/v2/repositories/${DOCKERHUB_NAMESPACE}/sibyl-${image}/"
            if ! curl --fail --silent --show-error --retry 3 "$url" >/dev/null; then
              echo "::error::Public Docker Hub repository is unavailable: ${DOCKERHUB_NAMESPACE}/sibyl-${image}"
              exit 1
            fi
          done

      - name: "◇ Login to Docker Hub"
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  # =========================================================================
  # Python: build + publish to PyPI
  # =========================================================================
  python:
    name: "◆ Python: Build & Publish"
    needs: rc-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # PyPI trusted publishing
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "◇ Install uv"
        uses: astral-sh/setup-uv@v8.3.0

      - name: "◇ Setup moonrepo toolchain"
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: publish-python-v1

      - name: "△ Build Python packages"
        run: moon run python-package-build

      - name: "► Upload Python distribution artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-python-${{ inputs.tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: "► Publish to PyPI"
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # =========================================================================
  # Homebrew: generate the tap formula from published PyPI artifacts
  # =========================================================================
  homebrew:
    name: "► Homebrew: Update tap"
    needs: python
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout Sibyl"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: "◇ Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "△ Extract and validate version from tag"
        id: version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version="${TAG#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected: vX.Y.Z or vX.Y.Z-suffix"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "△ Generate formula"
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python tools/release/homebrew_formula.py \
            --version "$VERSION" \
            --output homebrew-formula/Formula/sibyl.rb

      - name: "► Upload Homebrew formula artifact"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-homebrew-${{ steps.version.outputs.version }}
          path: homebrew-formula/Formula/sibyl.rb
          if-no-files-found: error
          retention-days: 90

      - name: "◇ Verify Homebrew tap token"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN is not configured; formula artifact was uploaded."
            exit 1
          fi
          if ! can_push="$(
            gh api repos/hyperb1iss/homebrew-tap --jq '.permissions.push // false'
          )"; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot authenticate; formula artifact was uploaded."
            exit 1
          fi
          if [[ "$can_push" != "true" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot push to hyperb1iss/homebrew-tap; formula artifact was uploaded."
            exit 1
          fi

      - name: "◆ Checkout Homebrew tap"
        uses: actions/checkout@v7
        with:
          repository: hyperb1iss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          persist-credentials: true

      - name: "△ Stage formula in tap"
        run: |
          mkdir -p homebrew-tap/Formula
          cp homebrew-formula/Formula/sibyl.rb homebrew-tap/Formula/sibyl.rb

      - name: "► Commit tap update"
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/sibyl.rb
          if git diff --cached --quiet -- Formula/sibyl.rb; then
            echo "Formula/sibyl.rb already matches v$VERSION"
            exit 0
          fi

          git commit \
            -m "feat: update sibyl to v$VERSION" \
            -m "Generate the formula from the published PyPI artifacts." \
            -m "The tap now installs both the sibyl CLI and sibyld daemon."
          git push

  # =========================================================================
  # AUR: generate and publish the Arch Linux package from PyPI artifacts
  # =========================================================================
  aur:
    name: "► AUR: Update package"
    needs: python
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout Sibyl"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: "◇ Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: "◇ Check AUR package version"
        id: aur_state
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          python_version="$(
            python - <<'PY'
          import os

          from tools.release.aur_pkgbuild import pep440_version

          print(pep440_version(os.environ["VERSION"]))
          PY
          )"
          current="$(
            python - <<'PY' || true
          import json
          import urllib.request

          url = "https://aur.archlinux.org/rpc/?v=5&type=info&arg[]=sibyl"
          with urllib.request.urlopen(url, timeout=30) as response:
              payload = json.load(response)
          results = payload.get("results") or []
          if results:
              print(results[0].get("Version", ""))
          PY
          )"
          expected="${python_version}-1"
          if [[ "$current" == "$expected" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "AUR sibyl already matches ${expected}"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: "△ Generate PKGBUILD"
        run: |
          python tools/release/aur_pkgbuild.py \
            --version "${{ steps.version.outputs.version }}" \
            --output PKGBUILD

      - name: "► Upload AUR PKGBUILD artifact"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-aur-${{ steps.version.outputs.version }}
          path: PKGBUILD
          if-no-files-found: error
          retention-days: 90

      - name: "► Publish to AUR"
        if: ${{ steps.aur_state.outputs.publish == 'true' }}
        uses: KSXGitHub/github-actions-deploy-aur@084b0d9b15415bf9cdb65d44dad1efe37a354050 # v4.2.0
        with:
          pkgname: sibyl
          pkgbuild: ./PKGBUILD
          commit_username: Stefanie Jane
          commit_email: stef@hyperbliss.tech
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}

  # =========================================================================
  # Docker: build each (image, platform) on its native runner, push by digest
  # =========================================================================
  docker-build:
    name: "△ Docker: ${{ matrix.image }} (${{ matrix.platform }})"
    needs: [rc-gate, registry-preflight]
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
        platform: [amd64, arm64]
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "◇ Login to GHCR"
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◇ Login to Docker Hub"
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "△ Build & push by digest"
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/${{ matrix.platform }}
          outputs: >-
            type=image,"name=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{
            matrix.image }},${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/sibyl-${{
            matrix.image }}",push-by-digest=true,name-canonical=true,push=${{ !inputs.dry_run }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: "△ Export digest"
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: "► Upload digest"
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # =========================================================================
  # Docker: merge per-arch digests into multi-arch manifest with final tags
  # =========================================================================
  docker-merge:
    name: "► Docker: Merge ${{ matrix.image }}"
    needs: docker-build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: "► Download digests"
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◇ Login to Docker Hub"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "► Create manifest list"
        working-directory: /tmp/digests
        env:
          GHCR_REPO:
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          DOCKERHUB_REPO:
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          for repo in "$GHCR_REPO" "$DOCKERHUB_REPO"; do
            refs=()
            for digest in *; do
              refs+=("${repo}@sha256:${digest}")
            done
            docker buildx imagetools create \
              -t "${repo}:latest" \
              -t "${repo}:${VERSION}" \
              "${refs[@]}"
          done

      - name: "△ Verify registry manifest parity"
        env:
          GHCR_REPO:
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          DOCKERHUB_REPO:
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ghcr_digest="$(docker buildx imagetools inspect "${GHCR_REPO}:${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          dockerhub_digest="$(docker buildx imagetools inspect "${DOCKERHUB_REPO}:${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          test -n "$ghcr_digest"
          test "$ghcr_digest" = "$dockerhub_digest"
          echo "Shared manifest digest: $ghcr_digest"

  # =========================================================================
  # Docker: generate SBOMs and fail on high/critical CVEs before signing
  # =========================================================================
  docker-security:
    name: "◆ Docker: Security ${{ matrix.image }}"
    needs: docker-merge
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◆ Generate Trivy SBOM"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: >-
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}:${{
            steps.version.outputs.version }}
          format: cyclonedx
          output: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}.cdx.json
          scanners: vuln

      - name: "► Upload SBOM"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}-sbom
          path: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: "◆ Trivy CVE gate"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: >-
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}:${{
            steps.version.outputs.version }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # =========================================================================
  # Docker: keyless Sigstore signatures for the scanned multi-arch images
  # =========================================================================
  docker-sign:
    name: "◆ Docker: Sign ${{ matrix.image }}"
    needs: docker-security
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        image: [api, web]
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: "◇ Setup Cosign"
        uses: sigstore/cosign-installer@v4.1.2

      - name: "◇ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "◇ Login to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "◇ Login to Docker Hub"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "◆ Sign image digest"
        env:
          GHCR_REPO:
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/sibyl-${{ matrix.image }}
          DOCKERHUB_REPO:
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/sibyl-${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ghcr_digest="$(
            docker buildx imagetools inspect "${GHCR_REPO}:${VERSION}" \
              --format '{{json .Manifest.Digest}}' \
              | tr -d '"'
          )"
          dockerhub_digest="$(
            docker buildx imagetools inspect "${DOCKERHUB_REPO}:${VERSION}" \
              --format '{{json .Manifest.Digest}}' \
              | tr -d '"'
          )"
          test -n "$ghcr_digest"
          test "$ghcr_digest" = "$dockerhub_digest"
          ghcr_ref="${GHCR_REPO}@${ghcr_digest}"
          dockerhub_ref="${DOCKERHUB_REPO}@${dockerhub_digest}"
          cosign sign --yes "$ghcr_ref"
          cosign sign --yes "$dockerhub_ref"
          mkdir -p cosign-receipts
          receipt="cosign-receipts/sibyl-${{ matrix.image }}-${VERSION}-cosign-receipt.json"
          IMAGE="${{ matrix.image }}" GHCR_REPO="$GHCR_REPO" DOCKERHUB_REPO="$DOCKERHUB_REPO" VERSION="$VERSION" DIGEST="$ghcr_digest" GHCR_REF="$ghcr_ref" DOCKERHUB_REF="$dockerhub_ref" RECEIPT="$receipt" python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "schema_version": "sibyl-cosign-receipt-v2",
              "status": "PASS",
              "signer": "github-actions-oidc-keyless",
              "image": os.environ["IMAGE"],
              "repository": os.environ["GHCR_REPO"],
              "version": os.environ["VERSION"],
              "digest": os.environ["DIGEST"],
              "image_ref": os.environ["GHCR_REF"],
              "signed_images": [
                  {
                      "repository": os.environ["GHCR_REPO"],
                      "digest": os.environ["DIGEST"],
                      "image_ref": os.environ["GHCR_REF"],
                  },
                  {
                      "repository": os.environ["DOCKERHUB_REPO"],
                      "digest": os.environ["DIGEST"],
                      "image_ref": os.environ["DOCKERHUB_REF"],
                  },
              ],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_sha": os.environ["GITHUB_SHA"],
              "workflow_ref": os.environ["GITHUB_REF"],
              "signed_at": datetime.now(UTC).isoformat(),
          }
          Path(os.environ["RECEIPT"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: "► Upload Cosign receipt"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-${{ matrix.image }}-${{ steps.version.outputs.version }}-cosign
          path:
            cosign-receipts/sibyl-${{ matrix.image }}-${{ steps.version.outputs.version
            }}-cosign-receipt.json
          if-no-files-found: error
          retention-days: 90

  # =========================================================================
  # Helm: validate and package immutable charts from the tagged checkout
  # =========================================================================
  helm-package:
    name: "△ Helm: Package charts"
    needs: rc-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "◆ Checkout"
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: "◇ Setup Helm"
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.20.2

      - name: "△ Validate and package charts"
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p dist/charts
          for chart in charts/sibyl charts/surrealdb; do
            chart_version="$(helm show chart "$chart" | awk '$1 == "version:" { print $2 }' | tail -1)"
            test "$chart_version" = "$version"
            helm lint "$chart"
          done
          helm dependency list charts/surrealdb | tee /tmp/surrealdb-dependencies.txt
          grep -Eq '^surrealdb[[:space:]]+0\.4\.0.*[[:space:]]ok[[:space:]]*$' /tmp/surrealdb-dependencies.txt
          helm package charts/sibyl --destination dist/charts
          helm package charts/surrealdb --destination dist/charts
          test -f "dist/charts/sibyl-${version}.tgz"
          test -f "dist/charts/sibyl-surrealdb-${version}.tgz"

      - name: "► Upload Helm chart artifact"
        uses: actions/upload-artifact@v7
        with:
          name: sibyl-helm-${{ inputs.tag }}
          path: dist/charts/*.tgz
          if-no-files-found: error
          retention-days: 90

  # =========================================================================
  # Helm: publish immutable packages and merge the raw gh-pages repository index
  # =========================================================================
  helm-publish:
    name: "► Helm: Publish repository"
    needs: [helm-package, python, homebrew, aur, docker-sign]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: "◆ Checkout Helm repository"
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: helm-repo

      - name: "◇ Setup Helm"
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.20.2

      - name: "► Download Helm chart artifact"
        uses: actions/download-artifact@v8
        with:
          name: sibyl-helm-${{ inputs.tag }}
          path: staged-charts

      - name: "► Publish immutable chart packages"
        run: |
          set -euo pipefail
          same_chart_contents() {
            local staged="$1" published="$2" workdir result=0
            workdir="$(mktemp -d)"
            mkdir "$workdir/staged" "$workdir/published"
            tar -xzf "$staged" -C "$workdir/staged"
            tar -xzf "$published" -C "$workdir/published"
            diff -r "$workdir/staged" "$workdir/published" >/dev/null || result=1
            rm -rf "$workdir"
            return "$result"
          }
          mkdir -p new-packages
          added=false
          for package in staged-charts/*.tgz; do
            name="$(basename "$package")"
            destination="helm-repo/${name}"
            if [[ -f "$destination" ]]; then
              # helm package archives are not byte-reproducible across checkouts,
              # so tag re-runs must compare chart contents rather than bytes.
              if ! same_chart_contents "$package" "$destination"; then
                echo "::error::Refusing to replace immutable chart: ${name}"
                exit 1
              fi
              continue
            fi
            cp "$package" "new-packages/${name}"
            added=true
          done
          if [[ "$added" != "true" ]]; then
            echo "Exact chart packages already published; nothing to do."
            exit 0
          fi
          # Index only the new packages so previously published entries keep
          # their original created timestamps and archive digests.
          helm repo index new-packages \
            --url https://raw.githubusercontent.com/hyperb1iss/sibyl/gh-pages \
            --merge helm-repo/index.yaml
          cp new-packages/*.tgz helm-repo/
          mv new-packages/index.yaml helm-repo/index.yaml
          git -C helm-repo config user.name github-actions[bot]
          git -C helm-repo config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C helm-repo add index.yaml '*.tgz'
          git -C helm-repo commit -F - <<'EOF'
          chore(helm): publish release charts

          Add the immutable Sibyl application and SurrealDB wrapper packages,
          then merge them into the raw-content Helm repository index.
          EOF
          git -C helm-repo push origin HEAD:gh-pages

  # =========================================================================
  # Release: update GitHub release with install instructions
  # =========================================================================
  release:
    name: "◆ Release: Update"
    needs: [python, homebrew, aur, docker-sign, helm-publish]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: "△ Extract version from tag"
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: "► Download Python distributions"
        uses: actions/download-artifact@v8
        with:
          name: sibyl-python-${{ inputs.tag }}
          path: release-evidence/python

      - name: "► Download Homebrew formula"
        uses: actions/download-artifact@v8
        with:
          name: sibyl-homebrew-${{ steps.version.outputs.version }}
          path: release-evidence/homebrew

      - name: "► Download AUR PKGBUILD"
        uses: actions/download-artifact@v8
        with:
          name: sibyl-aur-${{ steps.version.outputs.version }}
          path: release-evidence/aur

      - name: "► Download image evidence"
        uses: actions/download-artifact@v8
        with:
          path: release-evidence/images
          pattern: sibyl-*-${{ steps.version.outputs.version }}-*
          merge-multiple: true

      - name: "► Download Helm charts"
        uses: actions/download-artifact@v8
        with:
          name: sibyl-helm-${{ inputs.tag }}
          path: release-evidence/helm

      - name: "◇ Prepare release evidence assets"
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          find release-evidence/images -type f \( \
            -name "*.cdx.json" -o \
            -name "*-cosign-receipt.json" \
          \) -exec cp {} release-assets/ \;
          find release-evidence/python -type f \( \
            -name "*.whl" -o \
            -name "*.tar.gz" \
          \) -exec cp {} release-assets/ \;
          find release-evidence/helm -type f -name "*.tgz" -exec cp {} release-assets/ \;

          formula="$(find release-evidence/homebrew -type f -name "sibyl.rb" -print -quit)"
          pkgbuild="$(find release-evidence/aur -type f -name "PKGBUILD" -print -quit)"
          test -n "$formula"
          test -n "$pkgbuild"
          cp "$formula" "release-assets/sibyl-homebrew-${version}.rb"
          cp "$pkgbuild" "release-assets/sibyl-${version}-PKGBUILD"

          test "$(find release-assets -maxdepth 1 -type f -name '*.cdx.json' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -name '*-cosign-receipt.json' | wc -l)" -eq 2
          test "$(find release-assets -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 3
          test "$(find release-assets -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 3
          test "$(find release-assets -maxdepth 1 -type f -name '*.tgz' | wc -l)" -eq 2
          test -f "release-assets/sibyl-homebrew-${version}.rb"
          test -f "release-assets/sibyl-${version}-PKGBUILD"

          (
            cd release-assets
            sha256sum -- * > "sibyl-${version}-checksums.txt"
          )

      - name: "◇ Prepare release body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq .body \
            | awk '
                /^## Install$/ { stop = 1 }
                /^## Artifacts$/ { stop = 1 }
                !stop { print }
              ' > release-body.md
          cat >> release-body.md <<'EOF'

          ## Install

          **Local server**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --version ${{ steps.version.outputs.version }}
          ```

          **Remote CLI**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --remote --version ${{ steps.version.outputs.version }}
          sibyl init --remote https://sibyl.example.com
          sibyl auth login
          ```

          **Homebrew**
          ```bash
          brew install hyperb1iss/tap/sibyl
          sibyl up
          ```

          **Arch Linux (AUR)**
          ```bash
          paru -S sibyl
          sibyl up
          ```

          **Headless server**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/hyperb1iss/sibyl/main/install.sh | sh -s -- --version ${{ steps.version.outputs.version }} --no-open
          ```

          **Kubernetes (Helm)**
          ```bash
          helm repo add sibyl https://raw.githubusercontent.com/hyperb1iss/sibyl/gh-pages
          helm repo update sibyl
          helm upgrade --install sibyl sibyl/sibyl --version ${{ steps.version.outputs.version }}
          ```

          ## Artifacts

          This release includes Python wheels and sdists, the generated
          Homebrew formula, the generated AUR PKGBUILD, Helm charts, Docker
          SBOMs, aggregate dual-registry cosign receipts, and a SHA256 checksum
          manifest.
          EOF

      - name: "◆ Update release with install instructions"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: true
          body_path: release-body.md
          files: |
            release-assets/*

      - name: "► Summary"
        run: |
          {
            echo "## Publish ${{ inputs.tag }}"
            echo ""
            echo "### Python Packages"
            echo "- [sibyl-core](https://pypi.org/project/sibyl-core/${{ steps.version.outputs.version }}/)"
            echo "- [sibyl-dev](https://pypi.org/project/sibyl-dev/${{ steps.version.outputs.version }}/)"
            echo "- [sibyld](https://pypi.org/project/sibyld/${{ steps.version.outputs.version }}/)"
            echo ""
            echo "### Linux Packages"
            echo "- [sibyl](https://aur.archlinux.org/packages/sibyl)"
            echo ""
            echo "### Docker Images (multi-arch: linux/amd64, linux/arm64)"
            echo "- \`ghcr.io/hyperb1iss/sibyl-api:${{ steps.version.outputs.version }}\`"
            echo "- \`ghcr.io/hyperb1iss/sibyl-web:${{ steps.version.outputs.version }}\`"
            echo "- \`docker.io/hyperb1iss/sibyl-api:${{ steps.version.outputs.version }}\`"
            echo "- \`docker.io/hyperb1iss/sibyl-web:${{ steps.version.outputs.version }}\`"
            echo ""
            echo "### Helm Charts"
            echo "- Repository: https://raw.githubusercontent.com/hyperb1iss/sibyl/gh-pages"
            echo "- \`sibyl/sibyl --version ${{ steps.version.outputs.version }}\`"
            echo "- \`sibyl/sibyl-surrealdb --version ${{ steps.version.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
