name: LongMemEval V2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/longmemeval-v2.yml"
      - "benchmarks/longmemeval_v2_download.py"
      - "benchmarks/longmemeval_v2_memory/**"
      - "benchmarks/longmemeval_v2_official.py"
      - "benchmarks/longmemeval_v2_ablations.py"
      - "benchmarks/longmemeval_v2_reader_report.py"
      - "benchmarks/longmemeval_v2_reader_replication.py"
      - "benchmarks/longmemeval_v2_reader_replication_report.py"
      - "benchmarks/longmemeval_v2_reader_holdout.py"
      - "benchmarks/longmemeval_v2_reader_holdout_report.py"
      - "benchmarks/longmemeval_v2_causal_ablation.py"
      - "benchmarks/longmemeval_v2_causal_ablation_report.py"
      - "benchmarks/longmemeval_v2_validation_slice.py"
      - "benchmarks/longmemeval_v2_validation_slice_v2.py"
      - "benchmarks/longmemeval_v2_composition_validation.json"
      - "benchmarks/longmemeval_v2_composition_validation_v2.json"
      - "benchmarks/longmemeval_v2_diagnostics.py"
      - "benchmarks/longmemeval_v2_diagnostic_slice.json"
      - "benchmarks/longmemeval_v2_probe.py"
      - "packages/python/sibyl-core/src/sibyl_core/evals/**"
      - "tools/bench/eval_gate.py"
      - "tools/tests/test_longmemeval_v2_official.py"
      - "tools/tests/test_longmemeval_v2_ablations.py"
      - "tools/tests/test_longmemeval_v2_causal_ablation.py"
      - "tools/tests/test_longmemeval_v2_validation_slice.py"
      - "tools/tests/test_longmemeval_v2_validation_slice_v2.py"
      - "tools/tests/test_longmemeval_v2_diagnostics.py"
      - "packages/python/sibyl-core/tests/test_longmemeval_v2.py"
      - "tools/tests/test_longmemeval_v2_probe.py"
      - "tools/dev/surreal-runtime-monitor.sh"
      - "moon.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/longmemeval-v2.yml"
      - "benchmarks/longmemeval_v2_download.py"
      - "benchmarks/longmemeval_v2_memory/**"
      - "benchmarks/longmemeval_v2_official.py"
      - "benchmarks/longmemeval_v2_ablations.py"
      - "benchmarks/longmemeval_v2_reader_report.py"
      - "benchmarks/longmemeval_v2_reader_replication.py"
      - "benchmarks/longmemeval_v2_reader_replication_report.py"
      - "benchmarks/longmemeval_v2_reader_holdout.py"
      - "benchmarks/longmemeval_v2_reader_holdout_report.py"
      - "benchmarks/longmemeval_v2_causal_ablation.py"
      - "benchmarks/longmemeval_v2_causal_ablation_report.py"
      - "benchmarks/longmemeval_v2_validation_slice.py"
      - "benchmarks/longmemeval_v2_validation_slice_v2.py"
      - "benchmarks/longmemeval_v2_composition_validation.json"
      - "benchmarks/longmemeval_v2_composition_validation_v2.json"
      - "benchmarks/longmemeval_v2_diagnostics.py"
      - "benchmarks/longmemeval_v2_diagnostic_slice.json"
      - "benchmarks/longmemeval_v2_probe.py"
      - "packages/python/sibyl-core/src/sibyl_core/evals/**"
      - "tools/bench/eval_gate.py"
      - "tools/tests/test_longmemeval_v2_official.py"
      - "tools/tests/test_longmemeval_v2_ablations.py"
      - "tools/tests/test_longmemeval_v2_causal_ablation.py"
      - "tools/tests/test_longmemeval_v2_validation_slice.py"
      - "tools/tests/test_longmemeval_v2_validation_slice_v2.py"
      - "tools/tests/test_longmemeval_v2_diagnostics.py"
      - "packages/python/sibyl-core/tests/test_longmemeval_v2.py"
      - "tools/tests/test_longmemeval_v2_probe.py"
      - "tools/dev/surreal-runtime-monitor.sh"
      - "moon.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      run_official_full:
        description: "Run the approval-bound official full harness"
        type: boolean
        default: false
      official_tier:
        description: "Official haystack tier"
        type: choice
        options:
          - small
          - medium
        default: small
      official_domain:
        description: "Official domain selection; single-domain runs skip combined packaging"
        type: choice
        options:
          - both
          - web
          - enterprise
        default: both
      official_limit:
        description: "Optional question limit per domain; blank means full domain"
        type: string
        default: ""
      official_validation_slice:
        description: "Tracked validation or explicitly developmental replay"
        type: choice
        options:
          - none
          - composition-v1
          - composition-v2
          - composition-v2-developmental-accurate
        default: none
      official_dataset_revision:
        description: "Optional Hugging Face dataset revision"
        type: string
        default: ""
      official_reader_base_url:
        description: "OpenAI-compatible Qwen reader endpoint"
        type: string
        default: "https://openrouter.ai/api/v1"
      official_reader_model:
        description: "Official reader model"
        type: string
        default: "qwen/qwen3.5-9b"
      official_reader_api_key_env:
        description: "Environment variable containing the reader API key"
        type: string
        default: "OPENROUTER_API_KEY"
      official_reader_max_concurrent_requests:
        description: "Maximum concurrent official reader requests"
        type: string
        default: "16"
      official_reader_retry_attempts:
        description: "Attempts per reader request for transient provider failures"
        type: string
        default: "4"
      official_evidence_composition_mode:
        description: "Memory evidence composition strategy"
        type: choice
        options:
          - shared_relevance
          - reserved_support
        default: shared_relevance
      official_source_evidence_bundling:
        description: "Bundle policy-safe operational source evidence into typed items"
        type: boolean
        default: false
      official_retrieval_mode:
        description: "Evidence retrieval controller; frozen screens require fast"
        type: choice
        options:
          - fast
          - accurate
        default: accurate
      official_retrieval_max_planned_queries:
        description: "Maximum supplemental evidence queries in accurate mode"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
        default: "3"
      official_max_context_chars_per_item:
        description: "Maximum characters retained per retrieved context item"
        type: string
        default: "18000"
      official_typed_stream_retrieval:
        description: "Retrieve distilled notes alongside raw evidence"
        type: boolean
        default: false
      official_typed_stream_limit:
        description: "Maximum distilled-note candidates per retrieval"
        type: string
        default: "8"
      official_note_distillation:
        description: "Distill typed retrieval notes during fresh ingestion"
        type: boolean
        default: false
      official_note_distillation_model:
        description: "Memory model used to distill typed retrieval notes"
        type: string
        default: "gpt-5.4-nano"
      official_api_retry_attempts:
        description: "Attempts per Sibyl API request"
        type: string
        default: "3"
      official_prompt_build_max_workers:
        description: "Concurrent official prompt builders"
        type: string
        default: "1"
      official_evaluator_model:
        description: "Official evaluator model"
        type: string
        default: "gpt-5.2"
      official_include_screenshots:
        description: "Download trajectory screenshots and pass screenshot refs"
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group:
    ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' &&
    inputs.run_official_full && 'official-full' || 'standard' }}
  cancel-in-progress:
    ${{ github.event_name != 'workflow_dispatch' || !inputs.run_official_full }}

jobs:
  probe:
    name: Probe ${{ matrix.tier }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        tier: [small, medium]
    env:
      DATA_ROOT: .moon/cache/benchmarks/longmemeval-v2
      HF_BASE: https://huggingface.co/datasets/xiaowu0162/longmemeval-v2/resolve/main
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: longmemeval-v2-v1

      - name: Cache moon outputs
        uses: actions/cache@v6
        with:
          path: .moon/cache
          key: moon-longmemeval-v2-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-longmemeval-v2-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-longmemeval-v2-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-longmemeval-v2-${{ runner.os }}-

      - name: Fetch LongMemEval-V2 metadata
        run: |
          set -euo pipefail
          mkdir -p "$DATA_ROOT/haystacks" ".moon/cache/evals"
          curl -L --retry 3 --retry-delay 5 \
            "$HF_BASE/checksums.sha256?download=true" \
            -o "$DATA_ROOT/checksums.sha256"
          curl -L --retry 3 --retry-delay 5 \
            "$HF_BASE/questions.jsonl?download=true" \
            -o "$DATA_ROOT/questions.jsonl"
          curl -L --retry 3 --retry-delay 5 \
            "$HF_BASE/SCHEMA.md?download=true" \
            -o "$DATA_ROOT/SCHEMA.md"
          curl -L --retry 3 --retry-delay 5 \
            "$HF_BASE/haystacks/lme_v2_${{ matrix.tier }}.json?download=true" \
            -o "$DATA_ROOT/haystacks/lme_v2_${{ matrix.tier }}.json"
          (
            cd "$DATA_ROOT"
            grep -E '  (questions.jsonl|SCHEMA.md|haystacks/lme_v2_${{ matrix.tier }}\.json)$' \
              checksums.sha256 | sha256sum -c -
          )

      - name: Run LongMemEval-V2 probe
        run: |
          moon run bench-longmemeval-v2-probe -- \
            "$DATA_ROOT" \
            --tier "${{ matrix.tier }}" \
            --json \
            --output ".moon/cache/evals/longmemeval_v2_${{ matrix.tier }}_probe.json"

      - name: Upload LongMemEval-V2 probe artifact
        uses: actions/upload-artifact@v7
        with:
          name: longmemeval-v2-${{ matrix.tier }}-probe-${{ github.sha }}
          path: .moon/cache/evals/longmemeval_v2_${{ matrix.tier }}_probe.json
          if-no-files-found: error

  official-full:
    name: Official ${{ matrix.domain }} ${{ inputs.official_tier || 'small' }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_official_full
    runs-on: ubuntu-latest
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        domain:
          ${{ fromJSON(inputs.official_domain == 'web' && '["web"]' ||
          inputs.official_domain == 'enterprise' && '["enterprise"]' ||
          '["web","enterprise"]') }}
    env:
      COMPOSE_PROJECT_NAME: sibyl-longmemeval-v2
      DATA_ROOT: .moon/cache/benchmarks/longmemeval-v2-official
      OFFICIAL_REPO_DIR: .moon/cache/longmemeval-v2-official
      OUTPUT_ROOT: .moon/cache/evals/longmemeval-v2-official
      OFFICIAL_TIER: ${{ inputs.official_tier || 'small' }}
      OFFICIAL_LIMIT: ${{ inputs.official_limit || '' }}
      OFFICIAL_VALIDATION_SLICE: ${{ inputs.official_validation_slice || 'none' }}
      VALIDATION_MANIFEST:
        ${{ startsWith(inputs.official_validation_slice, 'composition-v2') &&
        'benchmarks/longmemeval_v2_composition_validation_v2.json' ||
        'benchmarks/longmemeval_v2_composition_validation.json' }}
      VALIDATION_TASK:
        ${{ startsWith(inputs.official_validation_slice, 'composition-v2') &&
        'bench-longmemeval-v2-validation-slice-v2' ||
        'bench-longmemeval-v2-validation-slice' }}
      MAX_CONTEXT_TOTAL_CHARS: "60000"
      OFFICIAL_DATASET_REVISION: ${{ inputs.official_dataset_revision || '' }}
      OFFICIAL_INCLUDE_SCREENSHOTS: ${{ inputs.official_include_screenshots || false }}
      READER_BASE_URL: ${{ inputs.official_reader_base_url || 'https://openrouter.ai/api/v1' }}
      READER_MODEL: ${{ inputs.official_reader_model || 'qwen/qwen3.5-9b' }}
      READER_API_KEY_ENV: ${{ inputs.official_reader_api_key_env || 'OPENROUTER_API_KEY' }}
      READER_MAX_CONCURRENT_REQUESTS: ${{ inputs.official_reader_max_concurrent_requests || '16' }}
      READER_RETRY_ATTEMPTS: ${{ inputs.official_reader_retry_attempts || '4' }}
      EVIDENCE_COMPOSITION_MODE:
        ${{ inputs.official_evidence_composition_mode || 'shared_relevance' }}
      SOURCE_EVIDENCE_BUNDLING: ${{ inputs.official_source_evidence_bundling || false }}
      RETRIEVAL_MODE: ${{ inputs.official_retrieval_mode || 'accurate' }}
      RETRIEVAL_MAX_PLANNED_QUERIES:
        ${{ inputs.official_retrieval_max_planned_queries || '3' }}
      MAX_CONTEXT_CHARS_PER_ITEM:
        ${{ inputs.official_max_context_chars_per_item || '18000' }}
      TYPED_STREAM_RETRIEVAL: ${{ inputs.official_typed_stream_retrieval || false }}
      TYPED_STREAM_LIMIT: ${{ inputs.official_typed_stream_limit || '8' }}
      NOTE_DISTILLATION: ${{ inputs.official_note_distillation || false }}
      NOTE_DISTILLATION_MODEL: ${{ inputs.official_note_distillation_model || 'gpt-5.4-nano' }}
      API_RETRY_ATTEMPTS: ${{ inputs.official_api_retry_attempts || '3' }}
      PROMPT_BUILD_MAX_WORKERS: ${{ inputs.official_prompt_build_max_workers || '1' }}
      EVALUATOR_MODEL: ${{ inputs.official_evaluator_model || 'gpt-5.2' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SIBYL_ENVIRONMENT: production
      SIBYL_JWT_SECRET: test-secret-for-longmemeval-v2
      SIBYL_STORE: surreal
      SIBYL_AUTH_STORE: surreal
      SIBYL_PUBLIC_SIGNUPS_ENABLED: "true"
      SIBYL_LOCAL_AUTH_ENABLED: "true"
      SIBYL_COORDINATION_BACKEND: local
      SIBYL_SURREAL_URL: ws://localhost:8000/rpc
      SIBYL_SURREAL_USERNAME: sibyl_ci
      SIBYL_SURREAL_PASSWORD: sibyl_ci_password
      SIBYL_SURREAL_PATH: rocksdb:///data/sibyl-longmemeval-v2.db
      SIBYL_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SIBYL_LLM_MEMORY_PROVIDER: openai
      SIBYL_LLM_MEMORY_MODEL: gpt-5.4-nano
      SIBYL_LLM_MEMORY_MAX_TOKENS: "800"
      SIBYL_LLM_MEMORY_TIMEOUT_SECONDS: "120"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v7
        with:
          repository: xiaowu0162/LongMemEval-V2
          ref: be15ea6e995462f3391c1a610892df3f67dfa7bd
          path: .moon/cache/longmemeval-v2-official
          persist-credentials: false

      - name: Guard paid-run dependencies
        run: |
          set -euo pipefail
          if [[ "$OFFICIAL_VALIDATION_SLICE" != "none" && -n "$OFFICIAL_LIMIT" ]]; then
            echo "::error::official_limit cannot be combined with a frozen validation slice."
            exit 1
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" != "none" && "$OFFICIAL_INCLUDE_SCREENSHOTS" == "true" ]]; then
            echo "::error::Screenshots are disabled by the frozen validation slice."
            exit 1
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" == "composition-v2-developmental-accurate" ]]; then
            if [[ "$RETRIEVAL_MODE" != "accurate" || "$RETRIEVAL_MAX_PLANNED_QUERIES" != "3" ]]; then
              echo "::error::Developmental replay requires accurate retrieval with three planned queries."
              exit 1
            fi
          elif [[ "$OFFICIAL_VALIDATION_SLICE" != "none" && "$RETRIEVAL_MODE" != "fast" ]]; then
            echo "::error::Existing frozen validation slices require retrieval_mode=fast."
            exit 1
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" != "none" && "$READER_BASE_URL" != "https://openrouter.ai/api/v1" ]]; then
            echo "::error::official_reader_base_url must exactly match the frozen validation slice."
            exit 1
          fi
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "::error::OPENAI_API_KEY repo secret is required for evaluator and Sibyl embeddings."
            exit 1
          fi
          if [[ -z "${READER_BASE_URL}" ]]; then
            echo "::error::official_reader_base_url must point at the Qwen3.5-9B reader endpoint."
            exit 1
          fi
          if [[ -z "${READER_API_KEY_ENV}" ]]; then
            echo "::error::official_reader_api_key_env must name the reader API key environment variable."
            exit 1
          fi
          reader_api_key="${!READER_API_KEY_ENV:-}"
          if [[ -z "${reader_api_key}" ]]; then
            echo "::error::${READER_API_KEY_ENV} repo secret is required for the Qwen3.5-9B reader."
            exit 1
          fi
          curl -fsS -H "Authorization: Bearer ${reader_api_key}" \
            "${READER_BASE_URL%/}/models" > /dev/null || {
            echo "::error::Reader endpoint is not reachable at ${READER_BASE_URL%/}/models."
            exit 1
          }

      - name: Start SurrealDB
        uses: ./.github/actions/start-surrealdb

      - name: Start SurrealDB runtime telemetry
        run: |
          set -euo pipefail
          telemetry="$RUNNER_TEMP/surrealdb-runtime"
          surrealdb_id="$(docker compose --env-file /dev/null ps -q surrealdb)"
          if [[ -z "$surrealdb_id" ]]; then
            echo "::error::SurrealDB container ID is unavailable."
            exit 1
          fi
          mkdir -p "$telemetry"
          tools/dev/surreal-runtime-monitor.sh monitor \
            --container "$surrealdb_id" \
            --output-dir "$telemetry" \
            --interval 5 \
            > "$telemetry/monitor.log" 2>&1 &
          monitor_pid=$!
          printf '%s\n' "$monitor_pid" > "$telemetry/monitor.pid"
          printf '%s\n' "$surrealdb_id" > "$telemetry/container.id"
          for _ in {1..20}; do
            if ! kill -0 "$monitor_pid" 2>/dev/null; then
              cat "$telemetry/monitor.log"
              exit 1
            fi
            if [[ -e "$telemetry/monitor-ready" ]] &&
              [[ -s "$telemetry/samples.tsv" ]] &&
              (( $(wc -l < "$telemetry/samples.tsv") >= 2 )); then
              exit 0
            fi
            sleep 1
          done
          echo "::error::SurrealDB telemetry did not produce its first sample."
          cat "$telemetry/monitor.log"
          exit 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: longmemeval-v2-official-v1

      - name: Cache moon outputs
        uses: actions/cache@v6
        with:
          path: .moon/cache
          key:
            moon-longmemeval-v2-official-${{ runner.os }}-${{ hashFiles('.prototools', 'uv.lock') }}
          restore-keys: |
            moon-longmemeval-v2-official-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-longmemeval-v2-official-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-longmemeval-v2-official-${{ runner.os }}-

      - name: Start backend server
        run: |
          set -euo pipefail
          cd apps/api
          uv run sibyld serve > /tmp/sibyld.log 2>&1 &
          for _ in {1..60}; do
            if curl -fsS http://localhost:3334/api/health > /dev/null; then
              sleep 2
              curl -fsS http://localhost:3334/api/health | head -c 200
              exit 0
            fi
            sleep 1
          done
          cat /tmp/sibyld.log
          exit 1

      - name: Start background job worker
        run: |
          cd apps/api
          uv run sibyld worker > /tmp/sibyl-worker.log 2>&1 &
          sleep 2

      - name: Fetch LongMemEval-V2 full dataset
        run: |
          set -euo pipefail
          args=(--data-root "$DATA_ROOT")
          if [[ -n "$OFFICIAL_DATASET_REVISION" ]]; then
            args+=(--revision "$OFFICIAL_DATASET_REVISION")
          fi
          if [[ "$OFFICIAL_INCLUDE_SCREENSHOTS" == "true" ]]; then
            args+=(--include-trajectory-screenshots)
          fi
          moon run bench-longmemeval-v2-download -- "${args[@]}"

      - name: Verify frozen validation slice
        if: inputs.official_validation_slice != 'none'
        run: |
          set -euo pipefail
          args=(
            verify
            --manifest "$VALIDATION_MANIFEST"
            --questions "$DATA_ROOT/questions.jsonl"
            --tier "$OFFICIAL_TIER"
            --reader-base-url "$READER_BASE_URL"
            --reader-model "$READER_MODEL"
            --reader-max-concurrent-requests "$READER_MAX_CONCURRENT_REQUESTS"
            --reader-retry-attempts "$READER_RETRY_ATTEMPTS"
            --evaluator-model "$EVALUATOR_MODEL"
            --evidence-composition-mode "$EVIDENCE_COMPOSITION_MODE"
            --output /tmp/longmemeval-v2-validation-runtime.json
          )
          if [[ "$SOURCE_EVIDENCE_BUNDLING" == "true" ]]; then
            args+=(--source-evidence-bundling)
          fi
          if [[ "$OFFICIAL_INCLUDE_SCREENSHOTS" == "true" ]]; then
            args+=(--include-screenshot-refs)
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" == composition-v2* ]]; then
            args+=(--max-context-total-chars "$MAX_CONTEXT_TOTAL_CHARS")
          fi
          moon run "$VALIDATION_TASK" -- "${args[@]}"
          web_question_ids="$(jq -e -r '.question_ids_by_domain.web | select(type == "array" and length > 0) | join(",")' /tmp/longmemeval-v2-validation-runtime.json)"
          enterprise_question_ids="$(jq -e -r '.question_ids_by_domain.enterprise | select(type == "array" and length > 0) | join(",")' /tmp/longmemeval-v2-validation-runtime.json)"
          printf 'OFFICIAL_WEB_QUESTION_IDS=%s\n' "$web_question_ids" >> "$GITHUB_ENV"
          printf 'OFFICIAL_ENTERPRISE_QUESTION_IDS=%s\n' "$enterprise_question_ids" >> "$GITHUB_ENV"

      - name: Run official LongMemEval-V2 domain
        run: |
          set -euo pipefail
          domain_output="$OUTPUT_ROOT/${{ matrix.domain }}_${OFFICIAL_TIER}"
          rm -rf "$domain_output"
          mkdir -p "$domain_output"
          args=()
          if [[ -n "$OFFICIAL_LIMIT" ]]; then
            args+=(--limit "$OFFICIAL_LIMIT")
          fi
          if [[ "${{ matrix.domain }}" == "web" ]]; then
            official_question_ids="${OFFICIAL_WEB_QUESTION_IDS:-}"
          else
            official_question_ids="${OFFICIAL_ENTERPRISE_QUESTION_IDS:-}"
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" != "none" && -z "$official_question_ids" ]]; then
            echo "::error::Frozen validation slice produced no question IDs for ${{ matrix.domain }}."
            exit 1
          fi
          if [[ -n "$official_question_ids" ]]; then
            args+=(--question-ids "$official_question_ids")
          fi
          if [[ "$OFFICIAL_INCLUDE_SCREENSHOTS" == "true" ]]; then
            args+=(--include-screenshot-refs)
          fi
          args+=(--evidence-composition-mode "$EVIDENCE_COMPOSITION_MODE")
          args+=(--retrieval-mode "$RETRIEVAL_MODE")
          args+=(--retrieval-max-planned-queries "$RETRIEVAL_MAX_PLANNED_QUERIES")
          args+=(--max-context-chars-per-item "$MAX_CONTEXT_CHARS_PER_ITEM")
          args+=(--typed-stream-limit "$TYPED_STREAM_LIMIT")
          args+=(--note-distillation-model "$NOTE_DISTILLATION_MODEL")
          args+=(--api-retry-attempts "$API_RETRY_ATTEMPTS")
          args+=(--prompt-build-max-workers "$PROMPT_BUILD_MAX_WORKERS")
          if [[ "$TYPED_STREAM_RETRIEVAL" == "true" ]]; then
            args+=(--typed-stream-retrieval)
          fi
          if [[ "$NOTE_DISTILLATION" == "true" ]]; then
            args+=(--note-distillation)
          fi
          if [[ "$SOURCE_EVIDENCE_BUNDLING" == "true" ]]; then
            args+=(--source-evidence-bundling)
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" == composition-v2* ]]; then
            args+=(--max-context-total-chars "$MAX_CONTEXT_TOTAL_CHARS")
          fi
          moon run bench-longmemeval-v2-official-full -- \
            --official-repo "$OFFICIAL_REPO_DIR" \
            --data-root "$DATA_ROOT" \
            --domain "${{ matrix.domain }}" \
            --tier "$OFFICIAL_TIER" \
            --output-dir "$domain_output" \
            --save-memory \
            --checkpoint-dir "$domain_output/ingest_checkpoint" \
            --api-url http://127.0.0.1:3334/api \
            --allow-localhost \
            --reader-base-url "$READER_BASE_URL" \
            --reader-model "$READER_MODEL" \
            --reader-api-key-env "$READER_API_KEY_ENV" \
            --reader-max-concurrent-requests "$READER_MAX_CONCURRENT_REQUESTS" \
            --reader-retry-attempts "$READER_RETRY_ATTEMPTS" \
            --evaluator-model "$EVALUATOR_MODEL" \
            --evaluator-api-key-env OPENAI_API_KEY \
            "${args[@]}"
          rm -rf "$domain_output/ingest_checkpoint"

      - name: Upload official domain artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name:
            longmemeval-v2-${{ matrix.domain }}-${{ inputs.official_tier || 'small' }}-${{
            github.sha }}
          path:
            .moon/cache/evals/longmemeval-v2-official/${{ matrix.domain }}_${{ inputs.official_tier
            || 'small' }}
          if-no-files-found: error

      - name: Capture service diagnostics
        if: always()
        run: |
          set +e
          telemetry="$RUNNER_TEMP/surrealdb-runtime"
          if [[ -f "$telemetry/docker-events.pid" ]]; then
            events_pid="$(cat "$telemetry/docker-events.pid")"
            if ! kill -0 "$events_pid" 2>/dev/null; then
              : > "$telemetry/docker-events.failed"
            fi
          else
            : > "$telemetry/docker-events.failed"
          fi
          if [[ -f "$telemetry/monitor.pid" ]]; then
            monitor_pid="$(cat "$telemetry/monitor.pid")"
            if kill -0 "$monitor_pid" 2>/dev/null; then
              kill "$monitor_pid" 2>/dev/null
              for _ in {1..70}; do
                kill -0 "$monitor_pid" 2>/dev/null || break
                sleep 0.1
              done
              if kill -0 "$monitor_pid" 2>/dev/null; then
                : > "$telemetry/monitor-force-killed"
                kill -KILL "$monitor_pid" 2>/dev/null
              fi
            else
              : > "$telemetry/monitor-unexpected-exit"
            fi
          else
            : > "$telemetry/monitor-unexpected-exit"
          fi
          if [[ -n "${events_pid:-}" ]]; then
            for _ in {1..20}; do
              kill -0 "$events_pid" 2>/dev/null || break
              sleep 0.1
            done
            if kill -0 "$events_pid" 2>/dev/null; then
              : > "$telemetry/docker-events-orphaned"
              kill "$events_pid" 2>/dev/null
            fi
          fi
          docker compose --env-file /dev/null ps --all \
            > /tmp/surrealdb-compose-ps.txt 2>&1
          surrealdb_id="$(docker compose --env-file /dev/null ps -q surrealdb)"
          if [[ -n "$surrealdb_id" ]]; then
            docker inspect "$surrealdb_id" > /tmp/surrealdb-inspect.json 2>&1
          fi
          docker compose --env-file /dev/null logs --no-color surrealdb \
            > /tmp/surrealdb.log 2>&1
          free -h > /tmp/runner-memory.txt 2>&1
          df -h > /tmp/runner-disk.txt 2>&1
          ps -eo pid,ppid,stat,%mem,rss,cmd --sort=-rss \
            > /tmp/runner-processes.txt 2>&1
          cat /proc/pressure/memory > "$telemetry/host-memory-pressure.txt" 2>&1
          sudo dmesg --ctime --color=never 2>&1 \
            | tee "$telemetry/kernel-dmesg.txt" > /dev/null
          sudo journalctl --dmesg --no-pager 2>&1 \
            | tee "$telemetry/kernel-journal.txt" > /dev/null

      - name: Gate SurrealDB runtime integrity
        if: always()
        run: |
          set -euo pipefail
          telemetry="$RUNNER_TEMP/surrealdb-runtime"
          surrealdb_id="$(cat "$telemetry/container.id")"
          tools/dev/surreal-runtime-monitor.sh gate \
            --container "$surrealdb_id" \
            --output-dir "$telemetry" \
            | tee "$telemetry/runtime-gate.log"

      - name: Upload service diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name:
            longmemeval-v2-${{ matrix.domain }}-${{ inputs.official_tier || 'small'
            }}-service-diagnostics-${{ github.sha }}
          path: |
            /tmp/sibyld.log
            /tmp/sibyl-worker.log
            /tmp/surrealdb-compose-ps.txt
            /tmp/surrealdb-inspect.json
            /tmp/surrealdb.log
            /tmp/runner-memory.txt
            /tmp/runner-disk.txt
            /tmp/runner-processes.txt
            ${{ runner.temp }}/surrealdb-runtime
          if-no-files-found: warn

  official-package:
    name: Official combined receipt
    if:
      github.event_name == 'workflow_dispatch' && inputs.run_official_full &&
      (inputs.official_domain || 'both') == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: official-full
    env:
      DATA_ROOT: .moon/cache/benchmarks/longmemeval-v2-official
      OFFICIAL_REPO_DIR: .moon/cache/longmemeval-v2-official
      OUTPUT_ROOT: .moon/cache/evals/longmemeval-v2-official
      SUBMISSION_ROOT: .moon/cache/evals/longmemeval-v2-submissions
      SUBMISSION_NAME: sibyl_live_api
      OPERATING_POINT_NAME: official
      OFFICIAL_TIER: ${{ inputs.official_tier || 'small' }}
      OFFICIAL_VALIDATION_SLICE: ${{ inputs.official_validation_slice || 'none' }}
      VALIDATION_MANIFEST:
        ${{ startsWith(inputs.official_validation_slice, 'composition-v2') &&
        'benchmarks/longmemeval_v2_composition_validation_v2.json' ||
        'benchmarks/longmemeval_v2_composition_validation.json' }}
      VALIDATION_TASK:
        ${{ startsWith(inputs.official_validation_slice, 'composition-v2') &&
        'bench-longmemeval-v2-validation-slice-v2' ||
        'bench-longmemeval-v2-validation-slice' }}
      OFFICIAL_DATASET_REVISION: ${{ inputs.official_dataset_revision || '' }}
      OFFICIAL_INCLUDE_SCREENSHOTS: ${{ inputs.official_include_screenshots || false }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/checkout@v7
        with:
          repository: xiaowu0162/LongMemEval-V2
          ref: be15ea6e995462f3391c1a610892df3f67dfa7bd
          path: .moon/cache/longmemeval-v2-official
          persist-credentials: false

      - name: Setup moonrepo toolchain
        uses: moonrepo/setup-toolchain@v0.6
        with:
          auto-install: true
          auto-setup: true
          cache-version: longmemeval-v2-official-v1

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-longmemeval-v2-package-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-longmemeval-v2-package-${{ runner.os }}-

      - name: Download web artifact
        uses: actions/download-artifact@v8
        with:
          name: longmemeval-v2-web-${{ inputs.official_tier || 'small' }}-${{ github.sha }}
          path: .moon/cache/evals/longmemeval-v2-official/web_${{ inputs.official_tier || 'small' }}

      - name: Download enterprise artifact
        uses: actions/download-artifact@v8
        with:
          name: longmemeval-v2-enterprise-${{ inputs.official_tier || 'small' }}-${{ github.sha }}
          path:
            .moon/cache/evals/longmemeval-v2-official/enterprise_${{ inputs.official_tier || 'small'
            }}

      - name: Fetch LongMemEval-V2 dataset metadata
        run: |
          set -euo pipefail
          args=(--data-root "$DATA_ROOT")
          if [[ -n "$OFFICIAL_DATASET_REVISION" ]]; then
            args+=(--revision "$OFFICIAL_DATASET_REVISION")
          fi
          if [[ "$OFFICIAL_INCLUDE_SCREENSHOTS" == "true" ]]; then
            args+=(--include-trajectory-screenshots)
          fi
          moon run bench-longmemeval-v2-download -- "${args[@]}"

      - name: Evaluate validation evidence
        if: inputs.official_validation_slice != 'none'
        run: |
          args=(
            evaluate \
            --manifest "$VALIDATION_MANIFEST" \
            --run "web=$OUTPUT_ROOT/web_${OFFICIAL_TIER}" \
            --run "enterprise=$OUTPUT_ROOT/enterprise_${OFFICIAL_TIER}" \
            --output "$OUTPUT_ROOT/composition_validation_report.json"
          )
          if [[ "$OFFICIAL_VALIDATION_SLICE" == composition-v2* ]]; then
            args+=(--questions "$DATA_ROOT/questions.jsonl")
          fi
          if [[ "$OFFICIAL_VALIDATION_SLICE" == "composition-v2-developmental-accurate" ]]; then
            args+=(--developmental-replay)
          fi
          moon run "$VALIDATION_TASK" -- "${args[@]}"

      - name: Upload frozen validation report
        if: always() && inputs.official_validation_slice != 'none'
        uses: actions/upload-artifact@v7
        with:
          name: longmemeval-v2-composition-validation-${{ github.sha }}
          path: .moon/cache/evals/longmemeval-v2-official/composition_validation_report.json
          if-no-files-found: error

      - name: Build official submission package and receipt
        if: inputs.official_validation_slice == 'none'
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_ROOT"
          cat > "$OUTPUT_ROOT/SYSTEM_DESCRIPTION.md" <<'EOF'
          Sibyl live API memory backend for LongMemEval-V2. The memory adapter
          writes trajectory chunks into Sibyl and queries Sibyl search for
          context before the fixed official reader answers each question.
          EOF

          python "$OFFICIAL_REPO_DIR/leaderboard/build_submission_step_1_single_operating_point.py" \
            "$OUTPUT_ROOT/web_${OFFICIAL_TIER}" \
            "$OUTPUT_ROOT/enterprise_${OFFICIAL_TIER}" \
            "$SUBMISSION_NAME" \
            "$OPERATING_POINT_NAME" \
            "$OFFICIAL_TIER" \
            --method sibyl_live_api \
            --output-root "$SUBMISSION_ROOT" \
            --force

          python "$OFFICIAL_REPO_DIR/leaderboard/build_submission_step_2_build_package.py" \
            "$SUBMISSION_NAME" \
            "$OUTPUT_ROOT/SYSTEM_DESCRIPTION.md" \
            benchmarks/longmemeval_v2_memory/sibyl_memory.py \
            "$SUBMISSION_ROOT/$SUBMISSION_NAME/operating_points/$OPERATING_POINT_NAME" \
            --output-root "$SUBMISSION_ROOT" \
            --force

          mkdir -p "$OUTPUT_ROOT/combined_${OFFICIAL_TIER}"
          python "$OFFICIAL_REPO_DIR/leaderboard/combine_aggregated_metrics.py" \
            "$OUTPUT_ROOT/web_${OFFICIAL_TIER}/aggregated_metrics.json" \
            "$OUTPUT_ROOT/enterprise_${OFFICIAL_TIER}/aggregated_metrics.json" \
            -o "$OUTPUT_ROOT/combined_${OFFICIAL_TIER}/aggregated_metrics.json"

          moon run bench-longmemeval-v2-official -- \
            --official-repo "$OFFICIAL_REPO_DIR" \
            --data-root "$DATA_ROOT" \
            --domain combined \
            --tier "$OFFICIAL_TIER" \
            --output-dir "$OUTPUT_ROOT/combined_${OFFICIAL_TIER}" \
            --receipt-only \
            --metric-overview "$SUBMISSION_ROOT/$SUBMISSION_NAME/operating_points/$OPERATING_POINT_NAME/metric_overview.json" \
            --combined-metrics "$OUTPUT_ROOT/combined_${OFFICIAL_TIER}/aggregated_metrics.json" \
            --submission-overview "$SUBMISSION_ROOT/$SUBMISSION_NAME/submission_overview.json" \
            --submission-archive "$SUBMISSION_ROOT/$SUBMISSION_NAME.tar.gz" \
            --web-output-dir "$OUTPUT_ROOT/web_${OFFICIAL_TIER}" \
            --enterprise-output-dir "$OUTPUT_ROOT/enterprise_${OFFICIAL_TIER}" \
            --receipt-output "$OUTPUT_ROOT/longmemeval_v2_${OFFICIAL_TIER}_receipt.json"

          moon run bench-gate -- \
            "$OUTPUT_ROOT/longmemeval_v2_${OFFICIAL_TIER}_receipt.json" \
            --profile longmemeval-v2

      - name: Upload official combined receipt
        if: inputs.official_validation_slice == 'none'
        uses: actions/upload-artifact@v7
        with:
          name: longmemeval-v2-combined-${{ inputs.official_tier || 'small' }}-${{ github.sha }}
          path: |
            .moon/cache/evals/longmemeval-v2-official/longmemeval_v2_${{ inputs.official_tier || 'small' }}_receipt.json
            .moon/cache/evals/longmemeval-v2-official/combined_${{ inputs.official_tier || 'small' }}/aggregated_metrics.json
            .moon/cache/evals/longmemeval-v2-official/composition_validation_report.json
            .moon/cache/evals/longmemeval-v2-submissions/sibyl_live_api.tar.gz
            .moon/cache/evals/longmemeval-v2-submissions/sibyl_live_api/submission_overview.json
            .moon/cache/evals/longmemeval-v2-submissions/sibyl_live_api/operating_points/official/metric_overview.json
          if-no-files-found: error
