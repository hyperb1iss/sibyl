# ============================================================================
# Sibyl Production Docker Compose
# Complete stack: Backend, Frontend, SurrealDB (unified store)
# ============================================================================
#
# Quick Start:
#   1. Copy .env.example to .env and configure secrets
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. Visit http://localhost:3337
#
# Default mode is fully Surreal. To run the legacy FalkorDB+Postgres stack:
#   SIBYL_STORE=legacy SIBYL_AUTH_STORE=postgres \
#     docker compose -f docker-compose.prod.yml --profile legacy up -d
# See docs/guide/migrating-from-falkor.md for migration guidance.
#
# Environment Variables (required):
#   SIBYL_JWT_SECRET          — Random secret for JWT signing (openssl rand -hex 32)
#   SIBYL_OPENAI_API_KEY      — OpenAI API key for embeddings
#   SIBYL_ANTHROPIC_API_KEY   — Anthropic API key for entity extraction and agents
#
# Environment Variables (optional):
#   SIBYL_SURREAL_PASSWORD    — SurrealDB root password (default: sibyl_dev; CHANGE IN PROD)
#   SIBYL_POSTGRES_PASSWORD   — PostgreSQL password (legacy mode; default: sibyl_dev)
#   SIBYL_FALKORDB_PASSWORD   - FalkorDB password (legacy mode; default: sibyl_dev)

services:
  # ==========================================================================
  # Backend API + MCP Server
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sibyl-backend
    depends_on:
      surrealdb:
        condition: service_healthy
    ports:
      - "3334:3334"
    environment:
      # Store selection — fully Surreal by default
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-auto}
      # SurrealDB (primary)
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: ${SIBYL_SURREAL_USERNAME:-root}
      SIBYL_SURREAL_PASSWORD: ${SIBYL_SURREAL_PASSWORD:-sibyl_dev}
      # Legacy backends — only used when SIBYL_STORE=legacy or SIBYL_AUTH_STORE=postgres
      SIBYL_DATABASE_URL: postgresql://${SIBYL_POSTGRES_USER:-sibyl}:${SIBYL_POSTGRES_PASSWORD:-sibyl_dev}@postgres:5432/${SIBYL_POSTGRES_DB:-sibyl}
      SIBYL_FALKORDB_HOST: falkordb
      SIBYL_FALKORDB_PORT: 6379
      SIBYL_FALKORDB_PASSWORD: ${SIBYL_FALKORDB_PASSWORD:-sibyl_dev}
      # Auth (REQUIRED)
      SIBYL_JWT_SECRET: ${SIBYL_JWT_SECRET:?Set SIBYL_JWT_SECRET in .env}
      SIBYL_SERVER_URL: ${SIBYL_SERVER_URL:-http://localhost:3334}
      # OpenAI (REQUIRED for embeddings)
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:?Set SIBYL_OPENAI_API_KEY in .env}
      # Anthropic (REQUIRED for entity extraction and agents)
      SIBYL_ANTHROPIC_API_KEY: ${SIBYL_ANTHROPIC_API_KEY:?Set SIBYL_ANTHROPIC_API_KEY in .env}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
      # Server config
      SIBYL_SERVER_HOST: 0.0.0.0
      SIBYL_SERVER_PORT: 3334
    healthcheck:
      test:
        ["CMD-SHELL", 'python -c "import httpx; httpx.get(''http://localhost:3334/api/health'')"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ==========================================================================
  # Frontend (Next.js)
  # ==========================================================================
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sibyl-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3337:3337"
    environment:
      # API URL for client-side requests (browser → external URL)
      NEXT_PUBLIC_API_URL: ${SIBYL_SERVER_URL:-http://localhost:3334}
      # API URL for server-side requests (Next.js server → backend container)
      SIBYL_API_URL: http://backend:3334/api
      NODE_ENV: production
    restart: unless-stopped

  # ==========================================================================
  # Background Worker (arq)
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sibyl-worker
    command: ["sibyld", "worker"]
    depends_on:
      surrealdb:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      SIBYL_STORE: ${SIBYL_STORE:-surreal}
      SIBYL_AUTH_STORE: ${SIBYL_AUTH_STORE:-surreal}
      SIBYL_COORDINATION_BACKEND: ${SIBYL_COORDINATION_BACKEND:-auto}
      SIBYL_SURREAL_URL: ws://surrealdb:8000/rpc
      SIBYL_SURREAL_USERNAME: ${SIBYL_SURREAL_USERNAME:-root}
      SIBYL_SURREAL_PASSWORD: ${SIBYL_SURREAL_PASSWORD:-sibyl_dev}
      SIBYL_DATABASE_URL: postgresql://${SIBYL_POSTGRES_USER:-sibyl}:${SIBYL_POSTGRES_PASSWORD:-sibyl_dev}@postgres:5432/${SIBYL_POSTGRES_DB:-sibyl}
      SIBYL_FALKORDB_HOST: falkordb
      SIBYL_FALKORDB_PORT: 6379
      SIBYL_FALKORDB_PASSWORD: ${SIBYL_FALKORDB_PASSWORD:-sibyl_dev}
      SIBYL_OPENAI_API_KEY: ${SIBYL_OPENAI_API_KEY:?Set SIBYL_OPENAI_API_KEY in .env}
      SIBYL_ANTHROPIC_API_KEY: ${SIBYL_ANTHROPIC_API_KEY:?Set SIBYL_ANTHROPIC_API_KEY in .env}
      SIBYL_LLM_PROVIDER: anthropic
      SIBYL_LLM_MODEL: claude-haiku-4-5
    restart: unless-stopped

  # ==========================================================================
  # SurrealDB (graph + content + auth, unified)
  # ==========================================================================
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: sibyl-surrealdb
    command:
      [
        "start",
        "--log",
        "info",
        "--user",
        "${SIBYL_SURREAL_USERNAME:-root}",
        "--pass",
        "${SIBYL_SURREAL_PASSWORD:-sibyl_dev}",
        "rocksdb:///data/sibyl.db",
      ]
    ports:
      - "${SIBYL_SURREAL_PORT:-8000}:8000"
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Legacy: FalkorDB (Knowledge Graph)
  # Only started with `--profile legacy`. Set SIBYL_STORE=legacy to use it.
  # ==========================================================================
  falkordb:
    image: falkordb/falkordb:latest
    container_name: sibyl-falkordb
    profiles: ["legacy"]
    ports:
      - "6380:6379" # Redis protocol (mapped to avoid conflicts)
      - "3335:3000" # FalkorDB Browser UI
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    environment:
      - FALKORDB_ARGS=--requirepass ${SIBYL_FALKORDB_PASSWORD:-sibyl_dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SIBYL_FALKORDB_PASSWORD:-sibyl_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Legacy: PostgreSQL (user data, embeddings, crawled docs)
  # Only started with `--profile legacy`. Also required when
  # SIBYL_AUTH_STORE=postgres during mid-migration transitions.
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg18
    container_name: sibyl-postgres
    profiles: ["legacy"]
    ports:
      - "5433:5432" # Mapped to avoid conflicts with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${SIBYL_POSTGRES_USER:-sibyl}
      POSTGRES_PASSWORD: ${SIBYL_POSTGRES_PASSWORD:-sibyl_dev}
      POSTGRES_DB: ${SIBYL_POSTGRES_DB:-sibyl}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${SIBYL_POSTGRES_USER:-sibyl} -d ${SIBYL_POSTGRES_DB:-sibyl}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  surreal_data:
  falkordb_data:
  postgres_data:

networks:
  default:
    name: sibyl-network
